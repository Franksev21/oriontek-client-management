spring.application.name=oriontek-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/oriontek
spring.datasource.username=oriontek
spring.datasource.password=oriontek123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# Server
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.oriontek=DEBUG
logging.level.org.springframework.web=INFO
